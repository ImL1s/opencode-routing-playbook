name: Validate profiles

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate profile catalog
        run: python3 scripts/validate_configs.py
      - name: Validate JSON formatting
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          files = [Path('profiles.json'), *Path('configs').glob('*/*.json')]
          for path in files:
              with path.open() as f:
                  json.load(f)
              print(f'OK {path}')
          PY
